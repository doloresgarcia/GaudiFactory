# This environment is for Phase 4 validation scripts (Python plot generation).
# The Gaudi/k4FWCore build uses the Key4hep cvmfs stack, not pixi.

[workspace]
name = "{name}"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64"]

[dependencies]
python = ">=3.11"
pandoc = ">=3.0"
tectonic = "*"

[pypi-dependencies]
uproot = ">=5.0"
numpy = ">=1.24"
matplotlib = ">=3.8"
mplhep = ">=1.1.0"
rich = ">=13.0"
# awkward = ">=2.0"   # uncomment if reading jagged EDM4hep collections

[tasks]
py = "python"
build-report = "cd phase5_documentation/outputs && pandoc REPORT.md -o REPORT.pdf --pdf-engine=tectonic --number-sections --toc -V geometry:margin=2.5cm -V fontsize=11pt --from=markdown+tex_math_dollars -H ../../latex-header.tex"
